name: "E-Commerce Full Deployment Pipeline"

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy Frontend → Netlify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Deploy Frontend
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: ./Frontend/dist   # ✅ FIXED (Vite output)
          production-branch: main
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.FRONTEND_NETLIFY_SITE_ID }}

  deploy-admin:
    name: Deploy Admin → Netlify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Admin
        run: npm run build

      - name: Deploy Admin
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: ./Admin/dist   # ✅ FIXED (Vite output)
          production-branch: main
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.ADMIN_NETLIFY_SITE_ID }}

  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}