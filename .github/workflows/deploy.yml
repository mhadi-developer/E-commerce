name: "E-Commerce Full Deployment Pipeline"

on:
  push:
    branches:
      - main

jobs:

  deploy-frontend:
    name: Deploy Frontend → Netlify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy Frontend to Netlify
        run: |
          netlify deploy \
            --dir=dist \
            --prod \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_FRONTEND_SITE_ID }}


  deploy-admin:
    name: Deploy Admin Panel → Netlify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Admin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Admin Panel
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy Admin to Netlify
        run: |
          netlify deploy \
            --dir=dist \
            --prod \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site=${{ secrets.NETLIFY_ADMIN_SITE_ID }}


  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-admin]

    steps:
      - name: Trigger Render Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
